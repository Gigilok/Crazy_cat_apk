name: crazycat_controller
description: Crazy Cat ESP32 Hacking Firmware Controller
publish_to: 'none'
version: 3.0.0+30

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  # Conectividade
  flutter_bluetooth_serial: ^0.4.0
  flutter_usb_serial: ^0.5.0
  http: ^1.1.0
  web_socket_channel: ^2.4.0
  network_info_plus: ^4.0.0
  connectivity_plus: ^5.0.0
  permission_handler: ^11.0.0
  
  # Camera e Stream
  flutter_mjpeg: ^2.0.4
  cached_network_image: ^3.3.0
  video_player: ^2.8.0
  
  # UI
  google_fonts: ^6.1.0
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  sliding_up_panel: ^2.0.0+1
  flutter_speed_dial: ^7.0.0
  fl_chart: ^0.65.0
  
  # Estado e Utils
  provider: ^6.1.0
  shared_preferences: ^2.2.0
  json_annotation: ^4.8.0
  intl: ^0.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0
  flutter_launcher_icons: ^0.13.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/fonts/
  
  fonts:
    - family: Cyberpunk
      fonts:
        - asset: assets/fonts/cyberpunk.ttf

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/cat_logo.png"
  min_sdk_android: 21
  
