# ==========================================
# pubspec.yaml - CrazyCat Controller v3.0
# ==========================================
name: crazycat_controller
description: CrazyCat v3.0 - RF Hacking Controller APK
publish_to: 'none'
version: 3.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # HTTP - DOWNGRADADO para compatibilidade com flutter_mjpeg
  http: ^0.13.6

  # Bluetooth Serial - versao BLE para Android 12+
  flutter_bluetooth_serial_ble: ^0.5.0

  # USB Serial - pacote correto: usb_serial
  usb_serial: ^0.5.2

  # MJPEG Camera Stream
  flutter_mjpeg: ^2.0.4

  # State Management
  provider: ^6.1.1

  # Icons
  cupertino_icons: ^1.0.6

  # Google Fonts
  google_fonts: ^6.1.0

  # Connectivity (WiFi status)
  connectivity_plus: ^5.0.2

  # Network Info (IP address)
  network_info_plus: ^4.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/fonts/
    
