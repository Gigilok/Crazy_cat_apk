name: Build CrazyCat APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: flutter pub run flutter_launcher_icons

      - name: Backup custom Android files
        run: |
          mkdir -p /tmp/android_backup
          cp -r android/app/src/main/res/mipmap-* /tmp/android_backup/ 2>/dev/null || true
          cp android/app/src/main/AndroidManifest.xml /tmp/android_backup/ 2>/dev/null || true
          cp -r android/app/src/main/res/xml /tmp/android_backup/ 2>/dev/null || true
          cp android/app/build.gradle /tmp/android_backup/ 2>/dev/null || true

      - name: Recreate Android project
        run: |
          rm -rf android
          flutter create --platforms=android --project-name crazycat_controller /tmp/crazycat_temp
          cp -r /tmp/crazycat_temp/android .

      - name: Restore custom Android files
        run: |
          cp -r /tmp/android_backup/mipmap-* android/app/src/main/res/ 2>/dev/null || true
          cp /tmp/android_backup/AndroidManifest.xml android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          mkdir -p android/app/src/main/res/xml
          cp -r /tmp/android_backup/xml/* android/app/src/main/res/xml/ 2>/dev/null || true
          cp /tmp/android_backup/build.gradle android/app/build.gradle 2>/dev/null || true

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: crazycat-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          tag: v${{ github.run_number }}
          name: CrazyCat v3.0.${{ github.run_number }}
          body: "Build automatico do CrazyCat Controller APK"
          token: ${{ secrets.GITHUB_TOKEN }}
          
