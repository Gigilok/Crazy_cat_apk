name: Build CrazyCat APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Recreate Android project
        run: |
          # Backup do AndroidManifest se existir
          cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest.xml 2>/dev/null || true
          # Deleta pasta android baguncada
          rm -rf android
          # Gera projeto android limpo em temp
          flutter create --platforms=android --project-name crazycat_controller /tmp/crazycat_temp
          # Copia a pasta android gerada de volta
          cp -r /tmp/crazycat_temp/android .
          # Restaura AndroidManifest se tinha backup
          cp /tmp/AndroidManifest.xml android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          # Cria device_filter.xml necessario para USB serial
          mkdir -p android/app/src/main/res/xml
          echo '<?xml version="1.0" encoding="utf-8"?>' > android/app/src/main/res/xml/device_filter.xml
          echo '<resources>' >> android/app/src/main/res/xml/device_filter.xml
          echo '    <usb-device vendor-id="1027" product-id="24597" />' >> android/app/src/main/res/xml/device_filter.xml
          echo '</resources>' >> android/app/src/main/res/xml/device_filter.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: crazycat-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          tag: v${{ github.run_number }}
          name: CrazyCat v3.0.${{ github.run_number }}
          body: "Build automatico do CrazyCat Controller APK"
          token: ${{ secrets.GITHUB_TOKEN }}
          
