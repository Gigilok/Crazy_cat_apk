# ==========================================
# .github/workflows/build_apk.yml
# ==========================================
name: Build CrazyCat APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.0'
          channel: 'stable'

      - name: Recreate Android project
        run: |
          # Backup dos arquivos personalizados
          cp android/app/src/main/AndroidManifest.xml /tmp/AndroidManifest.xml 2>/dev/null || true
          cp android/app/src/main/res/xml/device_filter.xml /tmp/device_filter.xml 2>/dev/null || true
          # Deleta a pasta android baguncada
          rm -rf android
          # Recria com a estrutura correta do Flutter 3.16.0
          flutter create --platforms=android --project-name crazycat_controller .
          # Restaura os arquivos personalizados
          cp /tmp/AndroidManifest.xml android/app/src/main/AndroidManifest.xml 2>/dev/null || true
          mkdir -p android/app/src/main/res/xml
          cp /tmp/device_filter.xml android/app/src/main/res/xml/device_filter.xml 2>/dev/null || true

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: crazycat-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/app/outputs/flutter-apk/app-release.apk"
          tag: v${{ github.run_number }}
          name: CrazyCat v3.0.${{ github.run_number }}
          body: "Build automatico do CrazyCat Controller APK"
          token: ${{ secrets.GITHUB_TOKEN }}
          
